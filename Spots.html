<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spots</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        header {
            background-color: #012b2a;
            color: whitesmoke;
            padding: 10px;
            position: relative;
        }
        main {
            background-color: #012b2a;
            color: whitesmoke;
            padding: 10px;
            position: relative;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        nav a {
            color: whitesmoke;
            text-decoration: none;
            font-size: 1.5rem;
            position: absolute;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>
    <main>
        <div id="map"></div>
    </main>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>

var locations = [
            [37.8735, -122.2580, 'UC Berkeley'],
            [33.065037, -117.304591, 'Beacons Beach'],
            [50.625990, 3.049318, 'Best Baguette Lille (Olive + Fromage)'],
            [50.951871, 1.849996, 'Best Park to Think'],
            [50.840995, 4.351427, "Quiche and Cafe ici: L'Atelier en Ville"],
            [48.850001, 2.348375, "Le Meillure Croissant: Maison d'Isabel"],
            [22.307826, 39.100863, "Snorkeling in the Red Sea"],
            [40.776327, -73.956122, "Ashley's epic spot"],
            [40.644285, -111.547453, "Deep Powder Stashed"],
            [37.768496, -122.512272, "Best well-known beach break in California"],
            [37.607837, -122.498816, "Rockaway Beach"],
            [37.309844, -122.405221, "Worth a check on a Sunny Day"],
            [52.371157, 4.900547, "Record Store I must revist, get a pin perhaps"],
            [50.641960, 3.061444, "Sunday Market, Not Wassem"],
            [46.432058, 4.662422, "Cluny France 71250"],
            [50.639806, 3.035579, "Park for loving"],
            [45.593944, 9.275967, "Monza, Home of Lucas"],
            [41.879486, 12.476992, "Soccer in the Streets"],
            [41.876724, 12.476235, "Get a meal here"],
            [41.90952128060139, 12.46713406507592, "Gelato, Sandwhiches and venture to find the spiritual one."],
            [41.889165427535886, 12.470760560231133, "Bar San Calisto"],
            [41.893842626693335, 12.477361325933906, "Wine cellar and cafe"]

        ];

        var map = L.map('map').setView([37.8715, -122.2730], 8); // UC Berkeley coordinates


        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);


        locations.forEach(function(location) {
            L.marker([location[0], location[1]]).addTo(map)
                .bindPopup(location[2]);
        });
    </script>
</body>
</html>
